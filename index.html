<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農田水利法規測驗 | 靜態版</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container fade-in">

    <div class="page-header">
      <h1>📚 農田水利考古題測驗</h1>
      <p class="subtitle">115年 1月版 ‧ 題庫模擬練習</p>
    </div>

    <div class="stat-row mb-24" id="statRow">
      <div class="stat-box" onclick="navigateToBrowse()">
        <div class="num" id="totalCount">...</div>
        <div class="lbl">題庫總題數 ‧ 點此瀏覽</div>
      </div>
      <div class="stat-box" onclick="navigateTo('wrong.html?scope=today')">
        <div class="num red" id="todayWrongCount">0</div>
        <div class="lbl">今日錯題 ‧ 複習</div>
      </div>
      <div class="stat-box" onclick="navigateTo('wrong.html?scope=past')">
        <div class="num red" id="pastWrongCount">0</div>
        <div class="lbl">往日錯題 ‧ 複習</div>
      </div>
    </div>

    <!-- Settings -->
    <div class="card mb-16">
      <label class="mb-8">📁 題庫選擇</label>
      <select id="questionBank" class="mb-16" onchange="onBankChange()">
        <option value="questions/questions.json">載入中...</option>
      </select>

      <div id="customPanel" class="mb-16" style="display:none">
        <div style="font-size:0.9rem;color:var(--text-dim);margin-bottom:8px">選擇要併入的題庫：</div>
        <div id="customBankList" style="display:flex;flex-direction:column;gap:6px"></div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px">
          <button class="btn btn-secondary btn-sm" onclick="selectAllBanks(true)">全選</button>
          <button class="btn btn-secondary btn-sm" onclick="selectAllBanks(false)">全不選</button>
          <span class="text-dim" style="font-size:0.9rem">已選：<strong id="customCount">0</strong> 題</span>
        </div>
      </div>

      <label class="mb-8">🎯 測驗模式</label>
      <select id="quizMode" class="mb-16">
        <option value="random">隨機挑選</option>
        <option value="wrong">曾錯過的題 (隨機 50 題)</option>
        <option value="still-wrong">至今仍錯的題 (隨機 50 題)</option>
        <option value="all">全題庫 (依順序)</option>
      </select>
      <label class="mb-8">📝 測驗題數</label>
      <select id="numQuestions">
        <option value="10">10 題 (快速練習)</option>
        <option value="25">25 題</option>
        <option value="50" selected>50 題 (標準模擬)</option>
        <option value="0">全題庫</option>
      </select>
    </div>

    <div id="resumeCard" class="card mb-16" style="display:none;border-color:#ffb300;background:#fffdf5">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <strong style="font-size:1.1rem">👋 您有上次未完成的測驗</strong>
          <div class="text-dim" style="font-size:0.95rem" id="resumeInfo"></div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary btn-sm" onclick="doResume()">繼續測驗</button>
          <button class="btn btn-secondary btn-sm" onclick="discardSession()">捨棄</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-block mb-16" onclick="doStart()">🚀 開始測驗練習</button>

    <!-- History -->
    <div class="card" id="historyCard" style="display:none">
      <h3 class="mb-12">📊 歷程紀錄</h3>
      <div id="historyList"></div>
      <div class="mt-16 text-center">
        <button class="btn btn-danger btn-sm" onclick="clearAll()">🧹 清除所有紀錄</button>
      </div>
    </div>

  </div>

  <script src="js/shared.js"></script>
  <script>
    let allQuestions = [];
    let currentBank = '';
    let BANK_INFO = [];

    function initCustomBankPanel() {
      document.getElementById('customBankList').innerHTML = BANK_INFO.map(b =>
        `<label style="display:flex;align-items:center;gap:8px;cursor:pointer">
      <input type="checkbox" value="${b.file}" onchange="updateCustomCount()"
        style="width:16px;height:16px;cursor:pointer">
      <span>${b.label} (${b.count} 題)</span>
    </label>`
      ).join('');
    }

    function selectAllBanks(checked) {
      document.querySelectorAll('#customBankList input[type="checkbox"]')
        .forEach(cb => cb.checked = checked);
      updateCustomCount();
    }

    function updateCustomCount() {
      let total = 0;
      document.querySelectorAll('#customBankList input[type="checkbox"]:checked')
        .forEach(cb => { const b = BANK_INFO.find(x => x.file === cb.value); if (b) total += b.count; });
      document.getElementById('customCount').textContent = total;
    }

    async function loadBank(bank) {
      if (!bank) return;
      currentBank = bank;
      const res = await fetch(bank);
      allQuestions = await res.json();
      document.getElementById('totalCount').textContent = allQuestions.length;
    }

    function onBankChange() {
      const val = document.getElementById('questionBank').value;
      document.getElementById('customPanel').style.display = val === '__custom__' ? 'block' : 'none';
      if (val !== '__custom__') loadBank(val);
    }

    async function loadBanks() {
      try {
        const res = await fetch('data/banks.json');
        const banks = await res.json();
        if (banks && banks.length > 0) {
          const sel = document.getElementById('questionBank');
          let html = '';
          banks.forEach(b => {
            html += `<option value="${b.file}">${b.name} (${b.count} 題)</option>`;
          });
          html += '<option disabled>─── 以上為自動偵測題庫 ───</option>';
          html += '<option value="__custom__">🎲 自訂 / 複選題庫...</option>';
          sel.innerHTML = html;

          BANK_INFO = banks.map(b => ({ file: b.file, label: b.name, count: b.count }));
          initCustomBankPanel();
          return banks[0].file;
        }
      } catch (e) { 
        console.error("Failed to load banks", e);
        showToast('無法讀取題庫索引');
      }
      return '';
    }

    async function init() {
      // 1. Load dynamic bank list
      const firstBank = await loadBanks();
      if (firstBank) await loadBank(firstBank);

      // 2. Check for saved session
      try {
        const raw = localStorage.getItem('quiz_session');
        if (raw) {
          const saved = JSON.parse(raw);
          if (saved.quizQ && saved.quizQ.length > 0) {
            const answered = Object.keys(saved.userAns || {}).length;
            const total = saved.quizQ.length;
            const mins = Math.floor((saved.elapsed || 0) / 60);
            document.getElementById('resumeInfo').textContent =
              `${total} 題中已做 ${answered} 題，已用時 ${mins} 分鐘`;
            document.getElementById('resumeCard').style.display = 'block';
          }
        }
      } catch { }

      // 3. Load wrong pool stats from LocalStorage
      const wp = getWrongPool();
      document.getElementById('todayWrongCount').textContent = wp.today_wrong.length;
      document.getElementById('pastWrongCount').textContent = wp.past_wrong.length;

      const modeEl = document.getElementById('quizMode');
      if (wp.ever_wrong.length === 0) {
        modeEl.querySelector('[value="wrong"]').disabled = true;
        modeEl.querySelector('[value="still-wrong"]').disabled = true;
      } else {
        modeEl.querySelector('[value="wrong"]').textContent = `曾錯過的題 (共 ${wp.ever_wrong.length} 題)`;
        modeEl.querySelector('[value="still-wrong"]').textContent = `至今仍錯的題 (剩 ${wp.still_wrong.length} 題)`;
      }

      // 4. Load history from LocalStorage
      const history = loadLocalHistory();
      if (history.length > 0) {
        document.getElementById('historyCard').style.display = 'block';
        const list = document.getElementById('historyList');
        list.innerHTML = history.slice().reverse().map((h, dispIdx) => {
          const realIdx = history.length - 1 - dispIdx;
          const pct = h.score || 0;
          const cls = pct >= 70 ? 'text-green' : 'text-red';
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
          <div>
            <span class="text-dim" style="font-size:0.9rem">${h.date || '?'}</span>
            <span class="fw-900 ${cls}" style="margin-left:12px">${pct}分 (${h.correct}/${h.total})</span>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-secondary btn-sm" style="padding:6px 12px;min-height:36px;font-size:0.85rem" onclick="viewHistory(${realIdx})">查閱</button>
            <button class="btn btn-sm" style="padding:6px 12px;min-height:36px;font-size:0.85rem;background:var(--wrong-bg);color:var(--wrong);border:1px solid #e57373" onclick="deleteSingle(${realIdx})">刪除</button>
          </div>
        </div>`;
        }).join('');
      }
    }

    function doStart() {
      try { localStorage.removeItem('quiz_session'); } catch { }
      const mode = document.getElementById('quizMode').value;
      const num = document.getElementById('numQuestions').value;
      const bankVal = document.getElementById('questionBank').value;

      if (mode === 'wrong' || mode === 'still-wrong') {
        window.location.href = `quiz.html?mode=${mode}&num=${num}`;
        return;
      }

      if (bankVal === '__custom__') {
        const selected = [...document.querySelectorAll('#customBankList input[type="checkbox"]:checked')]
          .map(cb => cb.value);
        if (selected.length === 0) { alert('請至少選擇一個題庫！'); return; }
        window.location.href = `quiz.html?mode=${mode}&num=${num}&banks=${selected.map(encodeURIComponent).join(',')}`;
      } else {
        window.location.href = `quiz.html?mode=${mode}&num=${num}&bank=${encodeURIComponent(bankVal)}`;
      }
    }

    function navigateToBrowse() {
      const val = document.getElementById('questionBank').value;
      const b = (val && val !== '__custom__') ? val : currentBank;
      window.location.href = `browse.html?bank=${encodeURIComponent(b)}`;
    }

    function doResume() {
      window.location.href = 'quiz.html?resume=1';
    }

    function discardSession() {
      if (!confirm('確定要捨棄未完成的測驗進度嗎？')) return;
      try { localStorage.removeItem('quiz_session'); } catch { }
      document.getElementById('resumeCard').style.display = 'none';
    }

    function viewHistory(idx) {
      window.location.href = `review.html?historyIdx=${idx}`;
    }

    function deleteSingle(idx) {
      if (!confirm('確定要刪除這筆紀錄嗎？')) return;
      deleteLocalHistory(idx);
      location.reload();
    }

    function clearAll() {
      if (!confirm('確定要清空所有紀錄嗎？此動作無法復原！')) return;
      clearLocalHistory();
      location.reload();
    }

    init();
  </script>
</body>

</html>
