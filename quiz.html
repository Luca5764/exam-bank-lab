<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>測驗中 | 考古題練習室</title>
  <link rel="stylesheet" href="css/style.css?v=theme2">
  <style>
    .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 6px; transition: width 0.3s; }
    .q-jump-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; padding: 12px; background: var(--card); border: 2px solid var(--border); border-radius: 12px; }
    .q-jump-btn { width: 42px; height: 42px; border: 2px solid var(--border); border-radius: 8px; background: var(--card); font-size: 0.9rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; color: var(--text-dim); }
    .q-jump-btn:hover { border-color: var(--accent); color: var(--accent); }
    .q-jump-btn.current { background: var(--accent); color: white; border-color: var(--accent); }
    .q-jump-btn.answered { background: var(--selected-bg); border-color: var(--selected-border); color: var(--selected-border); }
    .jump-legend { display: flex; gap: 16px; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 16px; flex-wrap: wrap; }
    .jump-legend span { display: flex; align-items: center; gap: 4px; }
    .ldot { width: 14px; height: 14px; border-radius: 4px; border: 2px solid var(--border); display: inline-block; }
    .ldot.l-cur { background: var(--accent); border-color: var(--accent); }
    .ldot.l-ans { background: var(--selected-bg); border-color: var(--selected-border); }
    .ldot.l-empty { background: var(--card); }
    .option-btn { display: flex; align-items: flex-start; gap: 14px; padding: 18px 20px; background: var(--card); border: 3px solid var(--border); border-radius: 14px; cursor: pointer; transition: all 0.15s; text-align: left; font-family: inherit; font-size: 1.1rem; color: var(--text); line-height: 1.7; width: 100%; }
    .option-btn { touch-action: manipulation; }
    .option-btn .opt-letter { flex-shrink: 0; width: 38px; height: 38px; border-radius: 10px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; color: var(--text-dim); transition: all 0.15s; margin-top: 2px; border: 2px solid var(--border); }
    .option-btn:focus { outline: none; }
    .option-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
    @media (hover: hover) and (pointer: fine) {
      .option-btn:hover { border-color: var(--accent); background: var(--accent-light); }
      .option-btn:hover .opt-letter { background: var(--accent); color: white; border-color: var(--accent); }
    }
    .option-btn.selected { border-color: var(--selected-border); background: var(--selected-bg); }
    .option-btn.selected .opt-letter { background: var(--selected-border); color: white; border-color: var(--selected-border); }
    .q-text { font-size: 1.25rem; line-height: 1.9; font-weight: 500; margin-bottom: 24px; }
    .multi-badge { display: inline-block; font-size: 0.85rem; font-weight: 700; color: var(--gold); background: var(--count-bg); border: 2px solid var(--gold); padding: 3px 12px; border-radius: 8px; margin-bottom: 14px; }
    .warn-box { background: var(--count-bg); border: 2px solid var(--gold); border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; font-size: 1rem; display: none; }
    .warn-box strong { color: var(--gold); }
    .nav-row { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  </style>
</head>

<body>
  <div class="container fade-in">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:1rem;color:var(--text-dim)">
        第 <strong style="color:var(--accent);font-size:1.15rem" id="curNum">1</strong> / <span id="totNum">50</span> 題
        &nbsp;‧&nbsp; 已答 <strong style="color:var(--accent)" id="ansCount">0</strong> 題
      </div>
      <div style="font-size:1rem;color:var(--text-dim);font-variant-numeric:tabular-nums" id="timer">00:00</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    <!-- Collapsible Jump Bar for Mobile -->
    <div class="jump-toggle-bar" id="jumpToggleBar" onclick="toggleJumpBar()">
      <span>題號捷徑面板</span>
      <span class="toggle-icon" id="jumpToggleIcon">▼</span>
    </div>
    <div class="jump-bar-wrapper" id="jumpBarWrapper">
      <div class="q-jump-bar" id="jumpBar"></div>
      <div class="jump-legend">
        <span><span class="ldot l-cur"></span> 目前</span>
        <span><span class="ldot l-ans"></span> 已答</span>
        <span><span class="ldot l-empty"></span> 未答</span>
      </div>
    </div>
    <div class="card" id="qCard"></div>
    <div class="warn-box" id="warnBox">
      ⚠️ 您還有 <strong id="warnNum">0</strong> 題尚未回答，確定要提交嗎？
      <div style="margin-top:10px;display:flex;gap:10px">
        <button class="btn btn-danger btn-sm" onclick="doSubmit()">確定提交</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('warnBox').style.display='none'">繼續作答</button>
      </div>
    </div>
    <div class="nav-row">
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary btn-sm" id="btnPrev" onclick="go(cur-1)">← 上一題</button>
        <button class="btn btn-secondary btn-sm" id="btnNext" onclick="go(cur+1)">下一題 →</button>
      </div>
      <button class="btn btn-primary btn-sm" onclick="trySubmit()">✅ 提交測驗</button>
    </div>
    <div class="kbd-hint" style="font-size:0.72rem;color:var(--text-dim);text-align:center;margin-top:8px">⌨️ 快捷鍵：1~9 / A~H 選答案 · ← → 換題 · Enter 下一題（最後一題交卷）</div>
  </div>

  <script src="js/shared.js?v=theme2"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const mode = params.get('mode') || 'random';
    let numQ = parseInt(params.get('num') || '50');
    const retryIds = params.get('retryIds');
    const isResume = params.get('resume') === '1';
    const bank = params.get('bank') || 'questions/questions.json';
    const srcBanksParam = params.get('srcBanks');
    const srcBanks = srcBanksParam ? new Set(srcBanksParam.split(',').map(decodeURIComponent)) : null;

    let allQ = [];
    let quizQ = [];
    let cur = 0;
    let userAns = {};
    let elapsedBefore = 0;
    let sessionStart = 0;
    let timerIv = null;
    let autoSaveIv = null;
    let isSubmitting = false;
    let pendingAdvanceTimer = null;
    let optionInputLockedUntil = 0;
    let showSource = false;

    const SAVE_KEY = 'quiz_session';

    function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]]; } return b; }

    function prepareQuestion(q) {
      const forceNoShuffle = q.noShuffle || (q.options && q.options.length === 2);
      if (forceNoShuffle) return { ...q };
      const idx = q.options.map((_, i) => i);
      const sh = shuffle(idx);
      let answer;
      if (isMultiAnswer(q)) {
        answer = q.answer.map(a => sh.indexOf(a));
      } else {
        answer = Number.isInteger(q.answer) ? sh.indexOf(q.answer) : q.answer;
      }
      return { ...q, options: sh.map(i => q.options[i]), answer };
    }

    function getQuestionGroupKey(q) {
      if (q.group || q.groupId) return `${q._bank || ''}|${q.group || q.groupId}`;
      const reading = (q.materials || []).find(m =>
        m && m.type === 'text' && /^閱讀資料（第\s*\d+\s*[-－~～]\s*\d+\s*題）$/.test(m.title || '')
      );
      return reading ? `${q._bank || ''}|${reading.title}|${reading.content || ''}` : '';
    }

    function buildQuestionBlocks(questions) {
      const blocks = [];
      const grouped = new Map();

      questions.forEach(q => {
        const key = getQuestionGroupKey(q);
        if (!key) {
          blocks.push([q]);
          return;
        }
        if (!grouped.has(key)) {
          const block = [];
          grouped.set(key, block);
          blocks.push(block);
        }
        grouped.get(key).push(q);
      });

      return blocks;
    }

    function findRemovalIndexes(blocks, targetCount) {
      const sums = new Map([[0, []]]);
      for (let i = blocks.length - 1; i >= 0; i--) {
        const size = blocks[i].length;
        for (const [sum, indexes] of [...sums]) {
          const nextSum = sum + size;
          if (nextSum > targetCount || sums.has(nextSum)) continue;
          const nextIndexes = [...indexes, i];
          if (nextSum === targetCount) return nextIndexes;
          sums.set(nextSum, nextIndexes);
        }
      }
      return null;
    }

    function takeQuestionBlocks(blocks, desiredCount, exactCount = false) {
      if (desiredCount === 0) return blocks.flat();

      if (!exactCount) {
        const selected = [];
        for (const block of blocks) {
          if (selected.length >= desiredCount) break;
          selected.push(...block);
        }
        return selected;
      }

      let selectedBlocks = [];
      let selectedCount = 0;
      for (const block of blocks) {
        if (selectedCount === desiredCount) break;

        const overflow = selectedCount + block.length - desiredCount;
        if (overflow <= 0) {
          selectedBlocks.push(block);
          selectedCount += block.length;
          continue;
        }

        const removalIndexes = findRemovalIndexes(selectedBlocks, overflow);
        if (!removalIndexes) continue;

        const removeSet = new Set(removalIndexes);
        selectedBlocks = selectedBlocks.filter((selectedBlock, index) => {
          if (!removeSet.has(index)) return true;
          selectedCount -= selectedBlock.length;
          return false;
        });
        selectedBlocks.push(block);
        selectedCount += block.length;
      }

      return selectedBlocks.flat();
    }

    function getQuestionHistoryKey(q) {
      return `${q._bank || bank}|${q.id}`;
    }

    function getBlockAttemptScore(block, statsMap) {
      return block.reduce((max, q) => {
        const s = statsMap[getQuestionHistoryKey(q)];
        return Math.max(max, s ? s.total : 0);
      }, 0);
    }

    function weightedShuffleQuestionBlocks(blocks) {
      // 共用 shared.js 的作答統計快取（跳過不計，與「沒做過的題」模式同口徑）
      const attemptCounts = getAttemptCountMap();
      if (!Object.keys(attemptCounts).length) return shuffle(blocks);

      return blocks
        .map((block, index) => {
          const attempts = getBlockAttemptScore(block, attemptCounts);
          const weight = 1 / Math.pow(1 + attempts, 2);
          const priority = -Math.log(Math.max(Math.random(), Number.EPSILON)) / weight;
          return { block, priority, index };
        })
        .sort((a, b) => a.priority - b.priority || a.index - b.index)
        .map((item) => item.block);
    }

    function selectQuestionPool(pool, mode, desiredCount) {
      const blocks = buildQuestionBlocks(pool);
      const orderedBlocks = mode === 'all'
        ? blocks
        : (mode === 'random' ? weightedShuffleQuestionBlocks(blocks) : shuffle(blocks));
      return takeQuestionBlocks(orderedBlocks, desiredCount, mode !== 'all');
    }

    function saveSession() {
      if (isSubmitting) return;
      const now = Date.now();
      const totalElapsed = elapsedBefore + Math.floor((now - sessionStart) / 1000);
      const data = { quizQ, cur, userAns, elapsed: totalElapsed, savedAt: now };
      try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch { }
    }

    function loadSession() { try { const raw = localStorage.getItem(SAVE_KEY); return raw ? JSON.parse(raw) : null; } catch { return null; } }
    function clearSession() { try { localStorage.removeItem(SAVE_KEY); } catch { } }

    function startAutoSave() {
      autoSaveIv = setInterval(saveSession, 3000);
      window.addEventListener('beforeunload', saveSession);
    }

    // 平行載入多個題庫檔，單檔失敗只略過該檔（與原本逐檔 try/catch 行為一致）
    async function fetchBanksParallel(bankFiles, pickQids = null) {
      const results = await Promise.all(bankFiles.map(async bf => {
        try {
          const qs = await fetchJson(bf);
          const picked = pickQids ? qs.filter(q => pickQids[bf].has(q.id)) : qs;
          return picked.map(q => ({ ...q, _bank: bf }));
        } catch (e) {
          console.error('Failed to load bank', bf, e);
          return [];
        }
      }));
      return results.flat();
    }

    async function init() {
      // 先把 overrides 與題庫名稱索引的下載踢出去，跟題庫檔平行載入；
      // 名稱索引不阻塞開場（載入前「顯示來源」會暫以檔名呈現）
      const overridesReady = initOverrides();
      loadBankLabels();

      if (isResume) {
        const saved = loadSession();
        if (saved && saved.quizQ && saved.quizQ.length > 0) {
          quizQ = saved.quizQ;
          cur = saved.cur || 0;
          userAns = saved.userAns || {};
          elapsedBefore = saved.elapsed || 0;
          sessionStart = Date.now();
          timerIv = setInterval(tick, 1000);
          document.getElementById('totNum').textContent = quizQ.length;
          buildJump(); render(); startAutoSave();
          return;
        }
      }

      let pool = [];
      if (mode === 'retry_session') {
        const stored = sessionStorage.getItem('retry_questions');
        sessionStorage.removeItem('retry_questions');
        try { pool = JSON.parse(stored) || []; } catch { pool = []; }
        if (!Array.isArray(pool) || !pool.length) { location.href = 'index.html'; return; }
      } else if (mode === 'wrong' || mode === 'still-wrong') {
        const wp = getWrongPool();
        let items = mode === 'wrong' ? wp.ever_wrong : wp.still_wrong;
        if (srcBanks) items = items.filter(it => srcBanks.has(it.bank));
        if (!items.length) { alert('沒有錯題可以練習！'); location.href = 'index.html'; return; }
        const byBank = {};
        for (const { bank: b, qid } of items) { (byBank[b] = byBank[b] || new Set()).add(qid); }
        pool = await fetchBanksParallel(Object.keys(byBank), byBank);
      } else if (mode === 'stat') {
        // 常錯題篩選：門檻由首頁帶在網址上（minWrong 累計答錯下限、maxAcc 正確率上限）
        const p = parseStatFilterInputs(params.get('minWrong'), params.get('maxAcc'));
        let items = getStatFilteredItems(Math.max(1, p.minWrong), p.maxAccPct);
        if (srcBanks) items = items.filter(it => srcBanks.has(it.bank));
        if (!items.length) { alert('沒有符合篩選門檻的題目可以練習！'); location.href = 'index.html'; return; }
        const byBank = {};
        for (const { bank: b, qid } of items) { (byBank[b] = byBank[b] || new Set()).add(qid); }
        pool = await fetchBanksParallel(Object.keys(byBank), byBank);
      } else if (mode === 'key') {
        let keyQuestions = getQuestionsWithTag('key').filter(item => isBankFileInActiveTrack(item.bank));
        if (srcBanks) keyQuestions = keyQuestions.filter(it => srcBanks.has(it.bank));
        if (!keyQuestions.length) { alert('沒有重點標記題可以練習！'); location.href = 'index.html'; return; }
        const byBank = {};
        for (const { bank: b, qid } of keyQuestions) { (byBank[b] = byBank[b] || new Set()).add(qid); }
        pool = await fetchBanksParallel(Object.keys(byBank), byBank);
      } else {
        const banksParam = params.get('banks');
        const bankFiles = banksParam
          ? banksParam.split(',').map(decodeURIComponent)
          : [decodeURIComponent(bank)];
        pool = await fetchBanksParallel(bankFiles);
      }

      // Filter by question type if requested
      const typesParam = params.get('types');
      if (typesParam) {
        const allowed = typesParam.split(',');
        pool = pool.filter(q => {
          const isTF = !isMultiAnswer(q) && q.options.length === 2;
          const isMC = isMultiAnswer(q);
          const isSC = !isMultiAnswer(q) && q.options.length > 2;
          
          if (allowed.includes('tf') && isTF) return true;
          if (allowed.includes('sc') && isSC) return true;
          if (allowed.includes('mc') && isMC) return true;
          return false;
        });
      }

      // Filter out excluded questions
      pool = pool.filter(q => {
        const meta = getQuestionMetadata(q._bank || bank, q.id);
        return meta.tag !== 'exclude';
      });

      // 「未練過」模式：只留下從未實際作答過的題（跳過不算，與單題「作答 N 次」一致）
      if (mode === 'unseen') {
        pool = pool.filter(q => getQuestionAttemptCount(q._bank || bank, q.id) === 0);
        if (!pool.length) {
          alert('選取的題庫都已經練過了！可改用其他模式，或加選更多題庫。');
          location.href = 'index.html';
          return;
        }
      }

      if (!pool.length) {
        alert('選取的題庫在該篩選條件下沒有符合的題目（是非題/單選題/複選題），請回首頁重新選擇！');
        location.href = 'index.html';
        return;
      }
      await initOverrides();
      pool.forEach(applyQuestionOverrides);

      if (numQ === 0 || numQ > pool.length) numQ = pool.length;
      pool = selectQuestionPool(pool, mode, numQ);
      numQ = pool.length;
      quizQ = pool.map(prepareQuestion);

      sessionStart = Date.now();
      timerIv = setInterval(tick, 1000);
      document.getElementById('totNum').textContent = quizQ.length;
      buildJump(); render(); startAutoSave();
    }

    function tick() {
      const total = elapsedBefore + Math.floor((Date.now() - sessionStart) / 1000);
      document.getElementById('timer').textContent = `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
    }

    function buildJump() {
      document.getElementById('jumpBar').innerHTML = quizQ.map((_, i) => `<button class="q-jump-btn" data-i="${i}" onclick="go(${i})">${i + 1}</button>`).join('');
    }

    function toggleJumpBar() {
      const bar = document.getElementById('jumpToggleBar');
      const wrapper = document.getElementById('jumpBarWrapper');
      const isExpanded = wrapper.classList.toggle('expanded');
      bar.classList.toggle('active', isExpanded);
    }

    function updateJump() {
      document.querySelectorAll('.q-jump-btn').forEach(b => {
        const i = +b.dataset.i;
        b.className = 'q-jump-btn';
        if (i === cur) b.classList.add('current');
        else {
          const ans = userAns[i];
          const answered = Array.isArray(ans) ? ans.length > 0 : ans !== undefined;
          if (answered) b.classList.add('answered');
        }
      });
      const answeredCount = Object.keys(userAns).filter(k => {
        const ans = userAns[k];
        return Array.isArray(ans) ? ans.length > 0 : ans !== undefined;
      }).length;
      document.getElementById('ansCount').textContent = answeredCount;
    }

    function render() {
      const q = quizQ[cur];
      const multi = isMultiAnswer(q);
      document.getElementById('curNum').textContent = cur + 1;
      document.getElementById('progFill').style.width = `${((cur + 1) / quizQ.length) * 100}%`;
      const sel = userAns[cur];

      let optionsHtml;
      if (multi) {
        const selSet = new Set(Array.isArray(sel) ? sel : []);
        optionsHtml = q.options.map((o, i) => `<button class="option-btn ${selSet.has(i) ? 'selected' : ''}" onclick="pick(${i}, event)"><span class="opt-letter">${LETTERS[i]}</span><span>${esc(o)}</span></button>`).join('');
      } else {
        optionsHtml = q.options.map((o, i) => `<button class="option-btn ${sel === i ? 'selected' : ''}" onclick="pick(${i}, event)"><span class="opt-letter">${LETTERS[i]}</span><span>${esc(o)}</span></button>`).join('');
      }

      const meta = getQuestionMetadata(q._bank || bank, q.id);
      const hasNotes = !!meta.notes;
      const metaHtml = `
        <div class="q-meta-panel" data-bank="${q._bank || bank}" data-qid="${q.id}">
          <div class="q-meta-tags">
            <span style="font-size:0.85rem;color:var(--text-dim);font-weight:700;margin-right:4px">題目標記：</span>
            <div class="tag-pill tag-key ${meta.tag === 'key' ? 'active' : ''}" onclick="toggleQuestionTag('${q._bank || bank}', ${q.id}, 'key', this)">⭐ 重點</div>
            <div class="tag-pill tag-exclude ${meta.tag === 'exclude' ? 'active' : ''}" onclick="toggleQuestionTag('${q._bank || bank}', ${q.id}, 'exclude', this)">🚫 排除</div>
            <div class="tag-pill tag-notes-toggle ${hasNotes ? 'has-notes' : ''}" onclick="toggleNotesCollapse(this)">📝 筆記</div>
          </div>
          <div class="q-meta-notes-wrapper" style="display: none; margin-top: 8px;">
            <textarea class="q-notes-input" placeholder="對此題撰寫筆記心得..." oninput="saveQuestionNotes('${q._bank || bank}', ${q.id}, this.value, this)">${esc(meta.notes)}</textarea>
          </div>
        </div>`;

      const repeatsHtml = q._repeats && q._repeats.length > 1
        ? `<span class="repeat-badge" title="重複考過年份：${q._repeats.join('、')}">🔄 ${q._repeats.map(r => r.split(' ')[0]).join('、')} 年</span>`
        : '';
      const attemptHtml = `<span style="font-size:0.75rem;color:var(--text-dim)" title="此題歷史作答次數（不含本次）">${questionAttemptLabel(q._bank || bank, q.id)}</span>`;
      const warningHtml = q._warning
        ? `<div class="amendment-warning">${esc(q._warning)}</div>`
        : '';

      document.getElementById('qCard').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${showSource ? '8px' : '16px'};flex-wrap:wrap;gap:8px">
          <span style="display:inline-block;font-size:0.9rem;font-weight:700;color:var(--accent);background:var(--accent-light);padding:5px 14px;border-radius:8px">第 ${cur + 1} 題</span>
          <div style="display:flex;align-items:center;gap:8px">
            ${repeatsHtml}
            ${attemptHtml}
            <button onclick="showSource=!showSource;render()" style="font-size:0.75rem;color:var(--text-dim);background:none;border:1.5px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:inherit">${showSource ? '隱藏來源' : '顯示來源'}</button>
          </div>
        </div>
        ${showSource ? `<div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:14px">來源：${bankLabel(q._bank)} · 原試卷第 ${q.id} 題</div>` : ''}
        <div class="q-text">${esc(q.question)}</div>
        ${warningHtml}
        ${renderMaterialsHTML(q.materials)}
        ${multi ? '<div class="multi-badge">☑ 複選題（請選出所有正確答案）</div>' : ''}
        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
          ${optionsHtml}
        </div>
        ${metaHtml}`;
      document.getElementById('btnPrev').style.visibility = cur > 0 ? 'visible' : 'hidden';
      document.getElementById('btnNext').style.visibility = cur < quizQ.length - 1 ? 'visible' : 'hidden';
      updateJump();
    }

    function clearPendingAdvance() {
      if (pendingAdvanceTimer) {
        clearTimeout(pendingAdvanceTimer);
        pendingAdvanceTimer = null;
      }
    }

    function pick(i, ev) {
      if (Date.now() < optionInputLockedUntil) {
        ev?.currentTarget?.blur();
        return;
      }
      const q = quizQ[cur];
      const multi = isMultiAnswer(q);

      if (multi) {
        const current = Array.isArray(userAns[cur]) ? [...userAns[cur]] : [];
        const idx = current.indexOf(i);
        if (idx >= 0) {
          current.splice(idx, 1);
        } else {
          current.push(i);
        }
        userAns[cur] = current.sort((a, b) => a - b);
        render();
        // No auto-advance for multi-answer
      } else {
        userAns[cur] = i;
        const answeredIdx = cur;
        render();

        clearPendingAdvance();
        if (answeredIdx < quizQ.length - 1) {
          optionInputLockedUntil = Date.now() + 300; // Lock input for 300ms to cover the 250ms advance timeout
          pendingAdvanceTimer = setTimeout(() => {
            pendingAdvanceTimer = null;
            if (cur === answeredIdx) {
              go(answeredIdx + 1, { autoAdvance: true });
              optionInputLockedUntil = Date.now() + 50; // Tiny 50ms lock to prevent accidental double clicks from carrying over
            }
          }, 250);
        }
      }
    }

    function go(i, opts = {}) {
      if (i < 0 || i >= quizQ.length) return;
      if (!opts.autoAdvance) clearPendingAdvance();
      cur = i;
      showSource = false;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function trySubmit() {
      const unanswered = quizQ.length - Object.keys(userAns).filter(k => {
        const ans = userAns[k];
        return Array.isArray(ans) ? ans.length > 0 : ans !== undefined;
      }).length;
      if (unanswered > 0) {
        document.getElementById('warnNum').textContent = unanswered;
        document.getElementById('warnBox').style.display = 'block';
        document.getElementById('warnBox').scrollIntoView({ behavior: 'smooth' });
      } else { doSubmit(); }
    }

    function doSubmit() {
      if (isSubmitting) return;
      isSubmitting = true;
      clearInterval(timerIv);
      const elapsed = elapsedBefore + Math.floor((Date.now() - sessionStart) / 1000);
      let correct = 0, wrong = 0, skip = 0;
      const answers = quizQ.map((q, i) => {
        const ua = userAns[i];
        const { answered, ok } = evaluateAnswer(q, ua);
        if (!answered) skip++; else if (ok) correct++; else wrong++;
        return { qid: q.id, bank: q._bank || bank, userAnswer: answered ? ua : null, correct: ok };
      });

      const now = new Date();
      const dateStr = `${now.getMonth() + 1}/${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      const pct = Math.round(correct / quizQ.length * 100);

      const record = {
        date: dateStr, date_iso: now.toISOString(), total: quizQ.length, correct, wrong, skip, score: pct, elapsed, answers,
        questions: quizQ.map(q => ({ id: q.id, question: q.question, materials: q.materials || [], options: q.options, answer: q.answer, freeScore: !!q.freeScore, _bank: q._bank }))
      };

      saveLocalHistory(record);
      clearInterval(autoSaveIv);
      clearSession();
      const history = loadLocalHistory();
      location.href = `review.html?historyIdx=${history.length - 1}`;
    }

    function onQuizKeydown(e) {
      if (!quizQ.length || isSubmitting) return;
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      const q = quizQ[cur];
      if (!q) return;

      let idx = -1;
      if (/^[1-9]$/.test(e.key)) idx = parseInt(e.key, 10) - 1;
      else if (/^[a-hA-H]$/.test(e.key)) idx = e.key.toLowerCase().charCodeAt(0) - 97;
      if (idx >= 0) {
        if (idx < q.options.length) { e.preventDefault(); pick(idx); }
        return;
      }

      if (e.key === 'ArrowRight') { e.preventDefault(); go(cur + 1); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); go(cur - 1); }
      else if (e.key === 'Enter') {
        e.preventDefault();
        if (cur < quizQ.length - 1) go(cur + 1);
        else trySubmit();
      }
    }
    window.addEventListener('keydown', onQuizKeydown);

    init();
  </script>
</body>
</html>
