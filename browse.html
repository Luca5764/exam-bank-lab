<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="data:,">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>題庫瀏覽 | 農田水利考古題</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container fade-in">

  <div class="back-link" onclick="location.href='index.html'">← 返回主選單</div>
  <h2 style="margin-bottom:4px">📖 題庫內容瀏覽</h2>
  <div class="mb-12">
    <select id="bankSelect" onchange="loadBank()" style="max-width:300px">
      <option value="">載入中...</option>
    </select>
  </div>
  <p class="text-dim mb-16">共 <strong id="count">...</strong> 題，顯示正確答案與說明</p>

  <div class="text-center mb-16">
    <button class="btn btn-secondary" onclick="copyAllBrowse()">📋 複製此題庫文字 (供 AI 閱讀)</button>
  </div>

  <div id="list"></div>
</div>

<script src="js/shared.js"></script>
<script>
let browseQ = [];

function copyBrowse(idx) {
  const q = browseQ[idx];
  const text = buildBrowsePrompt(q);
  copyText(text, document.getElementById(`cpbtn-${idx}`));
}

async function loadBank() {
  const bank = document.getElementById('bankSelect').value;
  if (!bank) return;
  try {
    const res = await fetch(bank);
    if (!res.ok) throw new Error('Not found');
    browseQ = await res.json();
    document.getElementById('count').textContent = browseQ.length;
    document.getElementById('list').innerHTML = browseQ.map((q, i) =>
      buildReviewItemHTML(q, { idx: i, userAns: undefined, mode: 'browse' })
    ).join('');
  } catch(e) {
    console.error(e);
    showToast('無法讀取題庫內容');
  }
}

async function loadBanks() {
  try {
    const res = await fetch('data/banks.json');
    const banks = await res.json();
    const sel = document.getElementById('bankSelect');
    sel.innerHTML = banks.map(b => `<option value="${b.file}">${b.name}</option>`).join('');

    const bankParam = new URLSearchParams(location.search).get('bank');
    if (bankParam && banks.some(b => b.file === bankParam)) {
      sel.value = bankParam;
    }
  } catch(e) {
    console.error(e);
  }
}

async function init() {
  await loadBanks(); 
  await loadBank();
}

function copyAllBrowse() {
  const header = `以下為 ${browseQ.length} 題農田水利相關法規題目內容：\n請根據這些內容回答問題，若有正確答案與說明請依照對應格式呈現。\n`;
  const texts = browseQ.map(q => buildBrowsePrompt(q));
  const full = header + '\n' + texts.join('\n' + '='.repeat(50) + '\n');
  copyText(full, event.target);
}

init();
</script>
</body>
</html>
