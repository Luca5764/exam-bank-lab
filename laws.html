<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法條字卡 | 考古題練習室</title>
  <link rel="stylesheet" href="css/style.css?v=laws3">
</head>

<body>
  <div class="container fade-in">
    <div class="back-link" onclick="navigateTo('index.html')">回首頁</div>

    <div class="page-header page-header-compact">
      <h1>法條字卡</h1>
      <p class="subtitle">左右滑讀法條、解釋與自己的備註。備註會存在目前瀏覽器。</p>
    </div>

    <section class="card law-browser">
      <div class="law-browser-head">
        <div>
          <div class="section-kicker">選擇法規</div>
          <h2>依法規層級閱讀</h2>
          <p class="settings-hint">排序由母法、施行細則到辦法；選定單一法規後可再切換章節。</p>
        </div>
      </div>
      <div id="lawChooser" class="law-choice-grid" aria-label="選擇法規">
        <div class="text-dim">法規載入中...</div>
      </div>
      <div id="chapterFilter" class="law-chip-row" aria-label="選擇章節"></div>

      <div class="law-actions">
        <button class="btn btn-secondary btn-sm" onclick="exportLawNotes()">匯出備註</button>
        <label class="btn btn-secondary btn-sm law-import-btn">
          匯入備註
          <input id="noteImport" type="file" accept="application/json" onchange="importLawNotes(event)">
        </label>
      </div>
      <div class="settings-hint mt-16">備註會存在目前瀏覽器，和測驗成績一樣；換手機、清除瀏覽器資料或使用無痕模式可能會消失。</div>
    </section>

    <section class="law-reader">
      <div class="law-progress-row">
        <div>
          <div class="section-kicker" id="lawScope">載入中</div>
          <strong id="lawProgress">0 / 0</strong>
          <div class="settings-hint law-swipe-hint">可在卡片上左右滑動切換，手機與電腦都能直接操作。</div>
          <button class="law-back-ref" id="lawBackRef" onclick="returnFromLawRef()" hidden>返回原法條</button>
        </div>
        <div class="law-card-jump">
          <label for="cardSlider">快速定位</label>
          <input id="cardSlider" type="range" min="1" max="1" value="1" oninput="jumpToCard(Number(this.value) - 1)">
          <div id="cardJumpLabel" class="settings-hint">載入中</div>
        </div>
      </div>

      <div class="law-embla" id="lawEmbla">
        <div class="law-embla-viewport" id="lawEmblaViewport">
          <div class="law-embla-container" id="lawSlides">
            <article class="law-card law-embla-slide">
              <div class="text-dim">法條資料載入中...</div>
            </article>
          </div>
        </div>
      </div>

      <div class="law-nav">
        <button class="btn btn-secondary" id="prevLawCard" onclick="moveCard(-1)">上一張</button>
        <button class="btn btn-primary" id="nextLawCard" onclick="moveCard(1)">下一張</button>
      </div>
    </section>
  </div>

  <script src="js/shared.js?v=theme1"></script>
  <script src="assets/vendor/embla/embla-carousel.umd.js?v=8.6.0"></script>
  <script>
    const LAW_NOTE_PREFIX = 'law_notes:v1';
    let laws = [];
    let lawLinksBySource = {};
    let lawLayoutsBySource = {};
    let deck = [];
    let currentIndex = 0;
    let emblaApi = null;
    let selectedLawId = 'all';
    let selectedChapterId = 'all';
    let lawRefHistory = [];
    const LAW_LEVEL_ORDER = {
      '母法': 1,
      '施行細則': 2,
      '辦法': 3
    };

    function noteKey(card) {
      return `${LAW_NOTE_PREFIX}:${card.law.id}:${card.article.id}`;
    }

    function lawSourceKey(lawId, articleId) {
      return `${lawId}::${articleId}`;
    }

    function escAttr(value) {
      return esc(value).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function prepareLawLinks(rawLinks) {
      lawLinksBySource = {};
      (rawLinks || []).forEach((item) => {
        const grouped = {};
        (item.refs || []).forEach((ref) => {
          if (!ref.field || !ref.text || !ref.targetLawId || !ref.targetArticleId) return;
          grouped[ref.field] = grouped[ref.field] || [];
          grouped[ref.field].push(ref);
        });
        lawLinksBySource[item.source] = grouped;
      });
    }

    function prepareLawLayouts(rawLayouts) {
      lawLayoutsBySource = {};
      (rawLayouts || []).forEach((item) => {
        if (!item.source || !Array.isArray(item.blocks)) return;
        lawLayoutsBySource[item.source] = item.blocks;
      });
    }

    function loadNote(card) {
      if (card.type !== 'article') return '';
      try { return localStorage.getItem(noteKey(card)) || ''; } catch { return ''; }
    }

    function saveNoteAt(index, value) {
      const card = deck[index];
      if (!card || card.type !== 'article') return;
      try {
        if (value.trim()) localStorage.setItem(noteKey(card), value);
        else localStorage.removeItem(noteKey(card));
      } catch (e) {
        console.error('Failed to save law note', e);
      }
    }

    function saveCurrentNote(value) {
      saveNoteAt(currentIndex, value);
    }

    function currentReturnState() {
      return lawRefHistory.length ? lawRefHistory[lawRefHistory.length - 1] : null;
    }

    function returnLabel(state) {
      if (!state) return '返回原法條';
      return `返回 ${state.lawTitle} ${state.articleTitle}`;
    }

    function getSelectedLaw() {
      return selectedLawId === 'all' ? null : laws.find((law) => law.id === selectedLawId);
    }

    function lawLevel(law) {
      if (law.title.includes('施行細則')) return '施行細則';
      if (law.title.includes('辦法')) return '辦法';
      return '母法';
    }

    function orderedLaws() {
      return laws
        .map((law, index) => ({ law, index }))
        .sort((a, b) => {
          const levelDiff = LAW_LEVEL_ORDER[lawLevel(a.law)] - LAW_LEVEL_ORDER[lawLevel(b.law)];
          if (levelDiff) return levelDiff;
          return a.index - b.index;
        })
        .map((item) => item.law);
    }

    function renderLawChooser() {
      const chooser = document.getElementById('lawChooser');
      const allCount = laws.reduce((sum, law) => sum + law.articleCount, 0);
      const cards = [{
        id: 'all',
        title: '全部法規',
        level: '總覽',
        meta: `${laws.length} 部法規 / ${allCount} 條`,
        summary: '依目前排序連續閱讀全部法條與各法規重點。',
      }].concat(orderedLaws().map((law) => ({
        id: law.id,
        title: law.title,
        level: lawLevel(law),
        meta: `${law.chapterCount} 章 / ${law.articleCount} 條`,
        summary: (law.summary || [])[0] || '尚未提供重點整理。',
      })));

      chooser.innerHTML = cards.map((card) => `
        <button class="law-choice ${selectedLawId === card.id ? 'is-active' : ''}" onclick="selectLaw('${esc(card.id)}')">
          <span class="law-choice-level">${esc(card.level)}</span>
          <strong>${esc(card.title)}</strong>
          <span>${esc(card.meta)}</span>
          <small>${esc(card.summary)}</small>
        </button>
      `).join('');
    }

    function renderChapterFilter() {
      const filter = document.getElementById('chapterFilter');
      const selectedLaw = getSelectedLaw();

      if (!selectedLaw) {
        filter.innerHTML = '<span class="settings-hint">選擇單一法規後，可依章節篩選。</span>';
        return;
      }

      const chips = [{
        id: 'all',
        label: `全部章節（${selectedLaw.articleCount}）`
      }].concat(selectedLaw.chapters.map((chapter) => ({
        id: chapter.id,
        label: `${chapter.title}（${chapter.articles.length}）`
      })));

      filter.innerHTML = chips.map((chip) => `
        <button class="law-chip ${selectedChapterId === chip.id ? 'is-active' : ''}" onclick="selectChapter('${esc(chip.id)}')">
          ${esc(chip.label)}
        </button>
      `).join('');
    }

    function selectLaw(id) {
      selectedLawId = id;
      selectedChapterId = 'all';
      renderLawChooser();
      renderChapterFilter();
      rebuildDeck();
    }

    function selectChapter(id) {
      selectedChapterId = id;
      renderChapterFilter();
      rebuildDeck();
    }

    function buildCardsForLaw(law, chapterId) {
      const cards = [{
        type: 'summary',
        law,
        label: '本法重點整理',
        title: `${law.title}重點整理`,
      }];

      law.chapters
        .filter((chapter) => chapterId === 'all' || chapter.id === chapterId)
        .forEach((chapter) => {
          chapter.articles.forEach((article) => {
            cards.push({
              type: 'article',
              law,
              chapter,
              article,
              label: `${chapter.title} / ${article.title}`,
              title: article.title
            });
          });
        });

      return cards;
    }

    function rebuildDeck() {
      const selectedLaw = getSelectedLaw();
      const selectedLaws = selectedLaw ? [selectedLaw] : orderedLaws();

      deck = selectedLaws.flatMap((law) => buildCardsForLaw(law, selectedLaw ? selectedChapterId : 'all'));
      currentIndex = 0;
      renderJump();
      renderSlides();
      initOrRefreshEmbla();
    }

    function renderJump() {
      const slider = document.getElementById('cardSlider');
      const label = document.getElementById('cardJumpLabel');
      slider.min = '1';
      slider.max = String(Math.max(1, deck.length));
      slider.value = deck.length ? '1' : '1';
      slider.disabled = deck.length <= 1;
      label.textContent = deck.length ? `1. ${deck[0].label}` : '沒有資料';
    }

    function renderSummary(card) {
      const chapterNames = card.law.chapters.map((chapter) => chapter.title).join('、');
      const points = (card.law.summary || []).map((item) => `<li>${esc(item)}</li>`).join('');

      return `
        <div class="law-card-kicker">${esc(card.law.title)}</div>
        <h2>${esc(card.title)}</h2>
        <ul class="law-summary-list">${points}</ul>
        <div class="law-meta-box">
          <strong>收錄範圍</strong>
          <p>${card.law.chapterCount} 章、${card.law.articleCount} 條</p>
          <p>${esc(chapterNames)}</p>
        </div>
      `;
    }

    function linkifyLawText(card, field, value) {
      const source = lawSourceKey(card.law.id, card.article.id);
      const refs = (lawLinksBySource[source] && lawLinksBySource[source][field]) || [];
      if (!refs.length) return esc(value);

      const matches = [];
      refs
        .slice()
        .sort((a, b) => b.text.length - a.text.length)
        .forEach((ref) => {
          let start = 0;
          while (start < value.length) {
            const index = value.indexOf(ref.text, start);
            if (index === -1) break;
            matches.push({ start: index, end: index + ref.text.length, ref });
            start = index + ref.text.length;
          }
        });

      matches.sort((a, b) => a.start - b.start || b.end - a.end);
      const chunks = [];
      let cursor = 0;
      matches.forEach((match) => {
        if (match.start < cursor) return;
        if (match.start > cursor) chunks.push(esc(value.slice(cursor, match.start)));
        chunks.push(`<a class="law-ref-link" href="#" data-target-law="${escAttr(match.ref.targetLawId)}" data-target-article="${escAttr(match.ref.targetArticleId)}" title="跳到 ${escAttr(match.ref.targetLawTitle)} ${escAttr(match.ref.targetArticleTitle)}">${esc(value.slice(match.start, match.end))}</a>`);
        cursor = match.end;
      });
      if (cursor < value.length) chunks.push(esc(value.slice(cursor)));
      return chunks.join('');
    }

    function splitFallbackParagraphs(value) {
      const normalized = String(value || '').replace(/\s+/g, ' ').trim();
      if (!normalized) return [];

      const sentences = normalized.match(/[^。！？；;]+[。！？；;]?/g) || [normalized];
      const paragraphs = [];
      let buffer = '';

      sentences.forEach((sentence) => {
        const trimmed = sentence.trim();
        if (!trimmed) return;
        const next = buffer ? `${buffer}${trimmed}` : trimmed;
        if (next.length >= 95 || /[；;]/.test(trimmed)) {
          paragraphs.push(next);
          buffer = '';
        } else if (buffer) {
          paragraphs.push(next);
          buffer = '';
        } else {
          buffer = next;
        }
      });

      if (buffer) paragraphs.push(buffer);
      return paragraphs;
    }

    function renderLayoutText(card, value) {
      return linkifyLawText(card, 'explanation', String(value || '').trim());
    }

    function renderExplanationBlock(card, block) {
      if (!block || !block.type) return '';

      if (block.type === 'paragraph') {
        return `<p>${renderLayoutText(card, block.text)}</p>`;
      }

      if (block.type === 'definitionList' && Array.isArray(block.items)) {
        return `
          <dl class="law-definition-list">
            ${block.items.map((item) => `
              <div>
                <dt>${renderLayoutText(card, item.term)}</dt>
                <dd>${renderLayoutText(card, item.text)}</dd>
              </div>
            `).join('')}
          </dl>
        `;
      }

      if ((block.type === 'bulletList' || block.type === 'steps') && Array.isArray(block.items)) {
        const tag = block.type === 'steps' ? 'ol' : 'ul';
        return `
          <${tag} class="law-layout-list">
            ${block.items.map((item) => `<li>${renderLayoutText(card, item)}</li>`).join('')}
          </${tag}>
        `;
      }

      return '';
    }

    function renderReadableExplanation(card) {
      const explanation = card.article.explanation || '尚未提供解釋。';
      const source = lawSourceKey(card.law.id, card.article.id);
      const layoutBlocks = lawLayoutsBySource[source];

      if (layoutBlocks && layoutBlocks.length) {
        return `
          <div class="law-readable">
            ${layoutBlocks.map((block) => renderExplanationBlock(card, block)).join('')}
          </div>
        `;
      }

      return `
        <div class="law-readable">
          ${splitFallbackParagraphs(explanation).map((paragraph) => `<p>${linkifyLawText(card, 'explanation', paragraph)}</p>`).join('')}
        </div>
      `;
    }

    function renderArticle(card, index) {
      const note = loadNote(card);
      const returnState = currentReturnState();
      const refContext = returnState ? `
        <div class="law-ref-context">
          <span>從 ${esc(returnState.lawTitle)} ${esc(returnState.articleTitle)} 跳來</span>
          <button type="button" onclick="returnFromLawRef()">${esc(returnLabel(returnState))}</button>
        </div>
      ` : '';
      return `
        <div class="law-card-kicker">${esc(card.law.title)} / ${esc(card.chapter.title)}</div>
        ${refContext}
        <h2>${esc(card.article.title)}</h2>
        <section class="law-section">
          <h3>法條</h3>
          <p>${linkifyLawText(card, 'text', card.article.text)}</p>
        </section>
        <section class="law-section">
          <h3>解釋</h3>
          ${renderReadableExplanation(card)}
        </section>
        <section class="law-section law-note-section">
          <div class="law-note-head">
            <h3>我的備註</h3>
            <button class="btn btn-secondary btn-sm" onclick="clearCurrentNote()">清除</button>
          </div>
          <textarea class="law-note" data-note-index="${index}" placeholder="查完資料後，可以把自己的整理貼在這裡。"
            oninput="saveNoteAt(${index}, this.value); updateEmblaHeight()">${esc(note)}</textarea>
        </section>
      `;
    }

    function renderSlides() {
      const slides = document.getElementById('lawSlides');

      if (!deck.length) {
        slides.innerHTML = '<article class="law-card law-embla-slide"><div class="text-dim">沒有符合條件的法條。</div></article>';
        syncEmblaState();
        return;
      }

      slides.innerHTML = deck.map((card, index) => `
        <article class="law-card law-embla-slide" data-slide-index="${index}">
          ${card.type === 'summary' ? renderSummary(card) : renderArticle(card, index)}
        </article>
      `).join('');
    }

    function syncEmblaState() {
      if (emblaApi) currentIndex = emblaApi.selectedScrollSnap();
      const card = deck[currentIndex];

      if (!card) {
        document.getElementById('lawScope').textContent = '沒有資料';
        document.getElementById('lawProgress').textContent = '0 / 0';
        document.getElementById('prevLawCard').disabled = true;
        document.getElementById('nextLawCard').disabled = true;
        updateEmblaHeight();
        return;
      }

      document.getElementById('lawScope').textContent = card.type === 'summary' ? card.law.title : card.chapter.title;
      document.getElementById('lawProgress').textContent = `${currentIndex + 1} / ${deck.length}`;
      document.getElementById('cardSlider').value = String(currentIndex + 1);
      document.getElementById('cardJumpLabel').textContent = `${currentIndex + 1}. ${card.label}`;
      document.getElementById('prevLawCard').disabled = emblaApi ? !emblaApi.canScrollPrev() : currentIndex === 0;
      document.getElementById('nextLawCard').disabled = emblaApi ? !emblaApi.canScrollNext() : currentIndex >= deck.length - 1;
      const backButton = document.getElementById('lawBackRef');
      const returnState = currentReturnState();
      backButton.hidden = !returnState;
      backButton.textContent = returnLabel(returnState);
      updateEmblaHeight();
    }

    function updateEmblaHeight() {
      const viewport = document.getElementById('lawEmblaViewport');
      const slide = document.querySelector(`[data-slide-index="${currentIndex}"]`);
      requestAnimationFrame(() => {
        viewport.style.height = slide ? `${slide.offsetHeight}px` : '';
      });
    }

    function initOrRefreshEmbla() {
      const viewport = document.getElementById('lawEmblaViewport');
      if (!window.EmblaCarousel) {
        console.error('EmblaCarousel is not loaded');
        syncEmblaState();
        return;
      }

      if (!emblaApi) {
        emblaApi = EmblaCarousel(viewport, {
          align: 'center',
          containScroll: 'trimSnaps',
          dragFree: false,
          duration: 28,
          skipSnaps: false
        });
        emblaApi.on('select', syncEmblaState);
        emblaApi.on('reInit', syncEmblaState);
        emblaApi.on('settle', updateEmblaHeight);
      } else {
        emblaApi.reInit();
      }

      emblaApi.scrollTo(0, true);
      syncEmblaState();
    }

    function moveCard(delta) {
      if (!emblaApi) return;
      if (delta > 0) emblaApi.scrollNext();
      else emblaApi.scrollPrev();
    }

    function jumpToCard(value) {
      const next = parseInt(value, 10);
      if (Number.isNaN(next)) return;
      const boundedNext = Math.max(0, Math.min(deck.length - 1, next));
      if (emblaApi) emblaApi.scrollTo(boundedNext);
    }

    function restoreLawPosition(state) {
      selectedLawId = state.selectedLawId;
      selectedChapterId = state.selectedChapterId;
      renderLawChooser();
      renderChapterFilter();
      rebuildDeck();
      if (emblaApi) emblaApi.scrollTo(Math.max(0, Math.min(deck.length - 1, state.index)));
    }

    function returnFromLawRef() {
      const previous = lawRefHistory.pop();
      if (!previous) return;
      restoreLawPosition(previous);
    }

    function goToLawRef(lawId, articleId) {
      const targetLaw = laws.find((law) => law.id === lawId);
      if (!targetLaw) return;

      lawRefHistory.push({
        selectedLawId,
        selectedChapterId,
        index: currentIndex,
        lawTitle: deck[currentIndex]?.law?.title || '原法規',
        articleTitle: deck[currentIndex]?.article?.title || deck[currentIndex]?.title || '原位置'
      });

      selectedLawId = lawId;
      selectedChapterId = 'all';
      renderLawChooser();
      renderChapterFilter();
      rebuildDeck();

      const targetIndex = deck.findIndex((card) =>
        card.type === 'article' && card.law.id === lawId && card.article.id === articleId
      );
      if (targetIndex >= 0 && emblaApi) emblaApi.scrollTo(targetIndex);
    }

    document.addEventListener('click', (event) => {
      const link = event.target.closest('.law-ref-link');
      if (!link) return;
      event.preventDefault();
      goToLawRef(link.dataset.targetLaw, link.dataset.targetArticle);
    });

    function clearCurrentNote() {
      const note = document.querySelector(`[data-note-index="${currentIndex}"]`);
      if (!note) return;
      note.value = '';
      saveNoteAt(currentIndex, '');
      updateEmblaHeight();
    }

    function collectLawNotes() {
      const notes = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(`${LAW_NOTE_PREFIX}:`)) {
          notes[key] = localStorage.getItem(key);
        }
      }
      return notes;
    }

    function exportLawNotes() {
      const payload = {
        exportedAt: new Date().toISOString(),
        version: 1,
        notes: collectLawNotes()
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'law-notes.json';
      link.click();
      URL.revokeObjectURL(link.href);
    }

    async function importLawNotes(event) {
      const file = event.target.files?.[0];
      event.target.value = '';
      if (!file) return;

      try {
        const payload = JSON.parse(await file.text());
        const notes = payload.notes || payload;
        let count = 0;
        Object.entries(notes).forEach(([key, value]) => {
          if (!key.startsWith(`${LAW_NOTE_PREFIX}:`)) return;
          localStorage.setItem(key, String(value || ''));
          count++;
        });
        showToast(`已匯入 ${count} 則備註`);
        renderSlides();
        initOrRefreshEmbla();
      } catch (e) {
        console.error('Failed to import law notes', e);
        alert('匯入失敗，請確認檔案是備註 JSON。');
      }
    }

    async function initLaws() {
      try {
        const [lawData, linkData, layoutData] = await Promise.all([
          fetchJson('data/laws.json'),
          fetchJson('data/law-links.json').catch(() => []),
          fetchJson('data/law-explanation-layouts.json').catch(() => [])
        ]);
        laws = lawData;
        prepareLawLinks(linkData);
        prepareLawLayouts(layoutData);
        renderLawChooser();
        renderChapterFilter();
        rebuildDeck();
      } catch (e) {
        console.error('Failed to load law data', e);
        document.getElementById('lawSlides').innerHTML = '<article class="law-card law-embla-slide"><div class="text-red">法條資料載入失敗。</div></article>';
      }
    }

    initLaws();
  </script>
</body>

</html>
