name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 或是您的主分支名稱

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate Question Index
        run: |
          cd tools
          python build_index.py
          cd ..

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 要發布的資料夾
          branch: gh-pages # 發布到這個分支
          clean: true
          # 排除不需要發布到網頁上的檔案與資料夾
          exclude: |
            tools/
            .venv/
            .github/
            *.py
            *.txt
            *.bat
            *.spec
            uv.lock
            pyproject.toml
            FUTURE.md
            README.md
