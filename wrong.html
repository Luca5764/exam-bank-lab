<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="icon" href="assets/icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0e3d2f">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>錯題集 | 考古題練習室</title>
  <link rel="stylesheet" href="css/style.css?v=theme2">
</head>
<body>
  <div class="container fade-in">
    <div class="back-link" onclick="location.href='index.html'">← 返回主選單</div>
    <h2 id="pageTitle" style="margin-bottom:4px">錯題複習</h2>
    <p class="text-dim mb-16" id="pageDesc">讀取中...</p>
    <div id="actions" class="mb-16" style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-secondary" id="btnCopyAll" onclick="copyAllWrongPool()">📋 複製所有錯題 (傳送給 AI)</button>
      <button class="btn btn-primary" id="btnRetry" onclick="retryAll()">🔥 開始錯題挑戰測驗</button>
    </div>
    <div class="card mb-16" id="bankScopeCard" style="display:none"></div>
    <div class="card mb-16" id="statFilterCard" style="display:none">
      <div class="scope-head">
        <span class="scope-title">依作答統計篩選</span>
        <span class="scope-summary" id="statFilterCount"></span>
      </div>
      <div class="scope-hint">與題目上的「作答 N 次 · 對 X／錯 Y」同口徑（跳過不計，後來答對過仍算錯過）。複製與挑戰測驗只會包含篩選後的題目。</div>
      <div class="stat-filter-row">
        <span>累計答錯 ≥</span>
        <input id="fMinWrong" class="number-input stat-num-input" type="number" min="1" step="1" placeholder="不限" inputmode="numeric" oninput="applyStatFilter()">
        <span>次，且正確率低於</span>
        <input id="fMaxAcc" class="number-input stat-num-input" type="number" min="1" max="100" step="1" placeholder="不限" inputmode="numeric" oninput="applyStatFilter()">
        <span>%（留空＝不限）</span>
      </div>
    </div>
    <div id="list"><p class="text-dim text-center mt-24">讀取中...</p></div>
  </div>
  <script src="js/shared.js?v=theme2"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const scope = params.get('scope') || 'today';
    let wrongQ = [];
    let allWrongIds = [];
    let qMap = {};
    let pageTitleText = '';

    // 來源題庫篩選（與首頁「曾錯過的題」同套 UX，null 代表尚未初始化＝全選）
    let scopeSelected = null;
    let scopeBanks = [];

    function copyBrowse(idx) {
      const q = wrongQ[idx];
      copyText(buildBrowsePrompt(q), document.getElementById(`cpbtn-${idx}`));
    }

    // 套用來源題庫篩選後的錯題清單（門檻篩選之前先過這層）
    function getScopeFilteredIds() {
      if (!scopeSelected) return allWrongIds.slice();
      return allWrongIds.filter(it => scopeSelected.has(it.bank));
    }

    function renderBankScopePanel() {
      const counts = {};
      for (const it of allWrongIds) counts[it.bank] = (counts[it.bank] || 0) + 1;
      scopeBanks = Object.keys(counts)
        .map(file => ({ file, count: counts[file], title: bankLabel(file) }))
        .sort((a, b) => b.count - a.count || a.title.localeCompare(b.title));

      const card = document.getElementById('bankScopeCard');
      // 只有單一來源時無從篩選，直接隱藏
      if (scopeBanks.length <= 1) { card.style.display = 'none'; scopeSelected = null; return; }

      const valid = new Set(scopeBanks.map(b => b.file));
      scopeSelected = scopeSelected
        ? new Set([...scopeSelected].filter(f => valid.has(f)))
        : new Set(valid);

      card.style.display = 'block';
      card.innerHTML = `
        <div class="scope-head">
          <span class="scope-title">限定來源題庫</span>
          <span class="scope-summary" id="scopeSummary"></span>
        </div>
        <div class="scope-hint">這些是${pageTitleText}實際所在的題庫，預設全選；取消勾選可只練特定來源（與下方門檻一起作用）。</div>
        <div class="bank-toolbar">
          <button class="btn btn-secondary btn-sm" onclick="setAllScope(true)">全選</button>
          <button class="btn btn-secondary btn-sm" onclick="setAllScope(false)">全不選</button>
        </div>
        <div class="scope-list">
          ${scopeBanks.map(b => `
            <label class="scope-item ${scopeSelected.has(b.file) ? 'selected' : ''}" data-file="${esc(b.file)}">
              <input type="checkbox" ${scopeSelected.has(b.file) ? 'checked' : ''} onchange="toggleScopeBank(this)">
              <span class="scope-item-title"><span class="scope-marquee">${esc(b.title)}</span></span>
              <span class="scope-item-count">${b.count} 題</span>
            </label>`).join('')}
        </div>`;
      updateScopeSummary();
    }

    function updateScopeSummary() {
      const summary = document.getElementById('scopeSummary');
      if (!summary) return;
      const total = scopeBanks.reduce((s, b) => s + b.count, 0);
      const sel = scopeBanks.filter(b => scopeSelected && scopeSelected.has(b.file)).reduce((s, b) => s + b.count, 0);
      summary.textContent = `已選 ${sel} 題 / 共 ${total} 題`;
    }

    function toggleScopeBank(input) {
      const item = input.closest('.scope-item');
      const file = item.dataset.file;
      if (input.checked) scopeSelected.add(file); else scopeSelected.delete(file);
      item.classList.toggle('selected', input.checked);
      updateScopeSummary();
      applyStatFilter();
    }

    function setAllScope(on) {
      scopeSelected = on ? new Set(scopeBanks.map(b => b.file)) : new Set();
      document.querySelectorAll('#bankScopeCard .scope-item').forEach(item => {
        const sel = scopeSelected.has(item.dataset.file);
        item.classList.toggle('selected', sel);
        const cb = item.querySelector('input');
        if (cb) cb.checked = sel;
      });
      updateScopeSummary();
      applyStatFilter();
    }

    // 依「來源題庫」＋「累計答錯次數／正確率」門檻重篩清單；複製與挑戰測驗都吃篩選後的 wrongQ
    function applyStatFilter() {
      const p = parseStatFilterInputs(
        document.getElementById('fMinWrong').value,
        document.getElementById('fMaxAcc').value
      );
      const ids = getScopeFilteredIds().filter(it => matchesStatFilter(getQuestionStats(it.bank, it.qid), p.minWrong, p.maxAccPct));
      wrongQ = ids.map(item => qMap[`${item.bank}:${item.qid}`]).filter(Boolean);

      const scopeNarrowed = scopeSelected && scopeBanks.length > 1 && scopeSelected.size < scopeBanks.length;
      const isFiltered = p.minWrong > 0 || p.maxAccPct !== null || scopeNarrowed;
      document.getElementById('statFilterCount').textContent = `符合門檻 ${ids.length} 題 / 共 ${allWrongIds.length} 題`;
      document.getElementById('pageDesc').textContent = isFiltered
        ? `篩選後 ${ids.length} 題（${pageTitleText}共 ${allWrongIds.length} 題）`
        : `系統記錄中 ${pageTitleText} 共 ${allWrongIds.length} 題`;
      document.getElementById('actions').style.display = wrongQ.length ? 'flex' : 'none';
      document.getElementById('list').innerHTML = wrongQ.length
        ? wrongQ.map((q, i) => buildReviewItemHTML(q, { idx: i, userAns: undefined, mode: 'browse' })).join('')
        : '<div class="card text-center" style="padding:40px"><p style="font-size:1.2rem">沒有符合篩選門檻的題目</p><p class="text-dim mt-16">可以調低答錯次數或放寬正確率上限。</p></div>';
    }

    async function init() {
      await initOverrides();
      await loadBankLabels();
      const history = loadLocalHistory();
      // 鍵的推導方式必須與 getWrongPool 一致（item.bank || session 預設值），
      // 不可退回裸 qid：不同題庫共用小整數題號，會撈到別的題庫的題目
      history.forEach(session => {
        const sessionBank = session.bank || 'questions/questions.json';
        (session.questions || []).forEach(q => {
          qMap[`${q._bank || sessionBank}:${q.id}`] = q;
        });
      });

      const wp = getWrongPool();
      allWrongIds = (scope === 'today') ? wp.today_wrong : (scope === 'past' ? wp.past_wrong : wp.ever_wrong);
      pageTitleText = (scope === 'today') ? '今日錯題' : (scope === 'past' ? '往日錯題' : '累積錯題');
      document.getElementById('pageTitle').textContent = `🚩 ${pageTitleText}`;

      if (allWrongIds.length === 0) {
        document.getElementById('pageDesc').textContent = `系統記錄中 ${pageTitleText} 共 0 題`;
        document.getElementById('list').innerHTML = '<div class="card text-center" style="padding:40px"><p style="font-size:1.2rem">🎉 這裡目前沒有題目！</p><p class="text-dim mt-16">太棒了，繼續保持下去吧。</p></div>';
        document.getElementById('actions').style.display = 'none';
        return;
      }

      renderBankScopePanel();
      document.getElementById('statFilterCard').style.display = 'block';
      applyStatFilter();
    }

    function copyAllWrongPool() {
      const header = `${SEARCH_HINT}\n以下為我在「${document.getElementById('pageTitle').textContent}」分類中的 ${wrongQ.length} 題考古題：\n請詳細為我解析正確答案與相關法規。\n`;
      copyText(header + '\n' + wrongQ.map(q => buildBrowsePrompt(q, { searchHint: false })).join('\n' + '='.repeat(50) + '\n'), document.getElementById('btnCopyAll'));
    }

    function retryAll() {
      sessionStorage.setItem('retry_questions', JSON.stringify(wrongQ));
      location.href = 'quiz.html?mode=retry_session&num=0';
    }
    init();
  </script>
</body>
</html>
